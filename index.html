<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>古代科技史料数字化——中国古代数理科技时间线（上古至明清完整版）</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "SimSun", "Microsoft YaHei", serif;
        }
        body {
            background-color: #f7f2e7;
            color: #2c2c2c;
        }
        header {
            background: linear-gradient(120deg, #783f04, #b45f06);
            color: #fff;
            padding: 30px 10px;
            text-align: center;
        }
        header h1 {
            margin-bottom: 10px;
            font-size: 28px;
        }
        .control-bar {
            max-width: 1200px;
            margin: 30px auto;
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
            align-items: center;
        }
        .control-bar input, .control-bar select {
            padding: 8px 12px;
            border: 1px solid #783f04;
            border-radius: 4px;
            font-size: 15px;
            width: 180px;
        }
        .control-bar button {
            padding: 8px 18px;
            background: #783f04;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            transition: 0.3s;
        }
        .control-bar button:hover {
            background: #b45f06;
        }
        /* 时间线主体 */
        .timeline-wrap {
            max-width: 1200px;
            margin: 0 auto 60px;
            position: relative;
            padding: 10px;
        }
        .timeline-wrap::before {
            content: "";
            position: absolute;
            left: 50%;
            top: 0;
            bottom: 0;
            width: 4px;
            background: #783f04;
            transform: translateX(-50%);
        }
        .timeline-item {
            width: 50%;
            margin: 35px 0;
            position: relative;
        }
        .item-left {
            padding-right: 40px;
            left: 0;
        }
        .item-right {
            padding-left: 40px;
            left: 50%;
        }
        .timeline-item::after {
            content: "";
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: #fff;
            border: 4px solid #783f04;
            position: absolute;
            top: 16px;
            z-index: 2;
        }
        .item-left::after {
            right: -9px;
        }
        .item-right::after {
            left: -9px;
        }
        .item-card {
            background: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 12px rgba(120, 63, 4, 0.12);
            cursor: pointer;
            transition: transform 0.25s ease;
        }
        .item-card:hover {
            transform: translateY(-6px);
        }
        .item-card h3 {
            color: #783f04;
            margin-bottom: 6px;
        }
        .year-text {
            font-size: 14px;
            color: #666;
            margin-bottom: 8px;
        }
        /* 弹窗样式 */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.65);
            z-index: 999;
            overflow-y: auto;
        }
        .modal-box {
            width: 92%;
            max-width: 720px;
            margin: 6% auto;
            background: #fff;
            padding: 32px;
            border-radius: 10px;
            position: relative;
        }
        .close-btn {
            position: absolute;
            right: 24px;
            top: 20px;
            font-size: 30px;
            color: #666;
            cursor: pointer;
        }
        .tag-label {
            display: inline-block;
            padding: 4px 10px;
            background: #f3e4cc;
            color: #783f04;
            border-radius: 20px;
            font-size: 13px;
            margin: 4px 6px 8px 0;
        }
        .modal-box p {
            margin: 12px 0;
            line-height: 1.7;
        }
        /* 移动端适配 */
        @media (max-width:768px) {
            .timeline-wrap::before {
                left: 22px;
            }
            .timeline-item {
                width: 100%;
                padding-left: 50px;
                padding-right: 10px;
            }
            .item-right {
                left: 0;
            }
            .item-left::after, .item-right::after {
                left: 13px;
            }
        }
    </style>
</head>
<body>
    <header>
        <h1>古代科技史料数字化——中国古代数理科技时间线</h1>
        <p>上古｜夏商｜周｜春秋战国｜汉｜魏晋｜隋唐｜宋｜元｜明｜清 完整科技脉络</p>
    </header>

    <div class="control-bar">

            <option value="数学">数学</option>
            <option value="天文">天文</option>

            <option value="物理">物理</option>
        </select>
        <input type="number" id="jumpYear" placeholder="年份跳转（前负后正）">
        <button id="jumpBtn">定位年份</button>
    </div>

    <div class="timeline-wrap" id="timelineBox"></div>

    <!-- 详情弹窗 -->

        // 渲染时间线
        function renderData(list){
            const box = document.getElementById("timelineBox");
            box.innerHTML = "";
            const sortList = [...list].sort((a,b)=>a.year - b.year);
            sortList.forEach((item,idx)=>{
                const side = idx%2===0 ? "item-left" : "item-right";
                const div = document.createElement("div");
                div.className = `timeline-item ${side}`;
                div.innerHTML = `
                    <div class="item-card" data-id="${item.id}">
                        <h3>${item.name}</h3>
                        <div class="year-text">${item.dynasty} · ${item.year>0 ? item.year+"年" : "公元前"+Math.abs(item.year)+"年"}</div>
                        <div>领域：${item.category}｜研究者：${item.author}</div>
                    </div>
                `;
                box.appendChild(div);
            })
            document.querySelectorAll(".item-card").forEach(card=>{
                card.onclick = ()=> openModal(Number(card.dataset.id));
            })
        }

        // 弹窗打开
        function openModal(id){
            const d = techData.find(x=>x.id===id);
            document.getElementById("modalTitle").innerText = d.name;
            document.getElementById("modalYear").innerText = `${d.dynasty} · ${d.year>0 ? d.year+"年" : "公元前"+Math.abs(d.year)+"年"}`;
            document.getElementById("tagGroup").innerHTML = `
                <span class="tag-label">${d.category}</span>
                <span class="tag-label">${d.author}</span>
            `;
            document.getElementById("modalPrinciple").innerText = d.principle;
            document.getElementById("modalValue").innerText = d.value;
            document.getElementById("modalExtend").innerText = d.extend;
            document.getElementById("detailModal").style.display = "block";
        }

        // 关闭弹窗
        document.querySelector(".close-btn").onclick = ()=>{
            document.getElementById("detailModal").style.display = "none";
        }
        window.onclick = e=>{
            if(e.target === document.getElementById("detailModal")){
                document.getElementById("detailModal").style.display = "none";
            }
        }

        // 搜索
        document.getElementById("searchInput").addEventListener("input",e=>{
            let k = e.target.value.toLowerCase();
            let res = techData.filter(d=>
                d.name.includes(k)||d.author.includes(k)||d.dynasty.includes(k)||String(d.year).includes(k)
            );
            renderData(res);
        })

        // 分类筛选
        document.getElementById("cateSelect").onchange = e=>{
            let v = e.target.value;
            renderData(v==="all"?techData:techData.filter(d=>d.category===v));
        }

        // 年份跳转
        document.getElementById("jumpBtn").onclick = ()=>{
            let y = Number(document.getElementById("jumpYear").value);
            if(isNaN(y)){alert("请输入有效年份！");return;}
            let tar = techData.find(d=>d.year===y);
            if(!tar){alert("暂无该年份成果！");return;}
            let dom = document.querySelector(`.item-card[data-id="${tar.id}"]`);
            dom.scrollIntoView({behavior:"smooth",block:"center"});
            dom.style.background="#f3e4cc";
            setTimeout(()=>dom.style.background="#fff",2000);
        }

        // 初始化
        renderData(techData);
    </script>
</body>
</html>
